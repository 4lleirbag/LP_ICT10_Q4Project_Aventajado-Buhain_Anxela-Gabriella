<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>Attendance Tracker</title>
    <style>
        /* Base styles */
       

        /* NEW HEADER STYLES */
        header {
            background-color: #1a73e8; /* The specific blue from your gallery */
            color: white;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed; /* Keep it at the top */
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        nav a:hover {
            color: white;
        }

        /* WRAPPER FOR CENTERING CONTENT */
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 50px;
            padding-top: 60px; /* Space for the fixed header */
        }

        .container {
            background-color: #FFE381;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h2 {
            color: #6F8695;
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333; /* Changed to dark for readability on yellow */
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #499ff5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #39b6ff;
        }

        .progress-bar {
            height: 10px;
            background-color: #28a745;
            border-radius: 5px;
            margin-top: 15px;
        }

        #plot-container {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f5fb;
            color: #2d3748;
        }
      
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            padding: 28px;
            margin-bottom: 24px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: #1e293b;
        }
        .header p {
            margin: 8px 0 0;
            color: #64748b;
        }
        .navbar {
            background: #800000;
            padding: 1rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .nav-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #f4e4c4;
            color: #3f1f1f;
            padding: 0.75rem 1.25rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }
        .field {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 18px;
        }
        .button {
            border: none;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .button:hover {
            transform: translateY(-1px);
        }
        .button-primary {
            background: #2563eb;
            color: white;
        }
        .button-secondary {
            background: #166534;
            color: white;
        }
        .list-card h2 {
            margin: 0 0 14px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .classmate-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .classmate-item {
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
        }
        .classmate-item:last-child {
            border-bottom: none;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Blue Top and Bottom Bars */
        header, footer {
            background-color: #1a73e8; /* Bright blue */
            color: white;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer {
            margin-top: auto;
            justify-content: center;
            font-size: 14px;
            padding: 15px;
        }

        /* Navigation Links */
        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        nav a:hover {
            color: white;
        }

        /* Main Content Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #202124;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold;">10-Amethyst</div>
        <nav>
            <a href="index.html">Classmates</a>
            <a href="index2.html">Attendance Tracker</a>
            <a href="proj.html">Gallery</a>
        </nav>
    </header>

    <div class="main-wrapper">
        <div class="container">
            <h2>Attendance Tracker</h2>
            
            <label>Select Day</label>
            <select id="day">
                <option value="monday">Monday</option>
                <option value="tuesday">Tuesday</option>
                <option value="wednesday">Wednesday</option>
                <option value="thursday">Thursday</option>
                <option value="friday" selected>Friday</option>
            </select>

            <label>Absences</label>
            <input type="number" id="num" value="0">

            <button onclick="plot()">Submit</button>
            <div class="progress-bar"></div>
        </div>

        <div id="plot-container">
            <div id="mypyplot"></div>
        </div>
    </div>

    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    <py-script src="main.py"></py-script>

</body>
</html>
