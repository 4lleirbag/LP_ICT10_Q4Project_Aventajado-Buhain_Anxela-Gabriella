<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Amethyst Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Blue Top and Bottom Bars */
        header, footer {
            background-color: #1a73e8; /* Bright blue */
            color: white;
            padding: 10px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer {
            margin-top: auto;
            justify-content: center;
            font-size: 14px;
            padding: 15px;
        }

        /* Navigation Links */
        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        nav a:hover {
            color: white;
        }

        /* Main Content Container */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            color: #202124;
            margin-bottom: 40px;
        }

        /* Gallery Grid (4 items per row) */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        /* Card Style */
        .gallery-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            width: calc(25% - 20px); /* 4 items per row minus gap */
            min-width: 250px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 180px;
            object-fit: cover; /* Ensures images are uniform size */
            display: block;
        }

        /* Text area inside card */
        .desc {
            padding: 15px;
        }

        .desc .name {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 5px;
            color: #333;
        }

        .desc .activity {
            font-size: 14px;
            color: #666;
        }

    </style>
</head>

<body>

    <header>
        <div style="font-weight: bold;">10-Amethyst</div>
        <nav>
            <a href="#">Classmates</a>
            <a href="index.html">Attendance Tracker</a>
            <a href="proj.html">Gallery</a>
        </nav>
    </header>

    <div class="container">
        <h1>Highlights of Our 10-Ruby Journey</h1>
        
        <div class="gallery">
            <div class="gallery-item">
                <img src="camp.webp" alt="Alice">
                <div class="desc">
                    <div class="name">Alice</div>
                    <div class="activity">Science Fair Fun!</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="speech.webp" alt="Bob">
                <div class="desc">
                    <div class="name">Bob</div>
                    <div class="activity">Soccer Tournament Day</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="swap.webp" alt="Charlie">
                <div class="desc">
                    <div class="name">Charlie</div>
                    <div class="activity">Art Class Creations</div>
                </div>
            </div>

            <div class="gallery-item">
                <img src="halloween.webp" alt="Diana">
                <div class="desc">
                    <div class="name">Diana</div>
                    <div class="activity">Field Trip Adventures</div>
                </div>
            </div>

            </div>
    </div>

    <footer>
        © 2025-2026 10-Ruby. All rights reserved.
    </footer>

</body>
</html>
